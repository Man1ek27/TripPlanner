<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generator Roadtripów Tematycznych</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 520px;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="max-w-7xl mx-auto p-6 lg:p-10">
      <section class="bg-white rounded-2xl shadow-lg p-6 lg:p-8">
        <h1 class="text-3xl font-bold">Generator Roadtripów Tematycznych</h1>
        <p class="mt-2 text-slate-600">
          Zaplanuj trasę przez Polskę tak, aby przejechać przez punkt z wybranej kategorii.
        </p>

        <form id="routeForm" class="mt-6 grid gap-4 md:grid-cols-4">
          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold">Start</span>
            <select id="startSelect" class="border rounded-xl p-2" required></select>
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold">Koniec</span>
            <select id="endSelect" class="border rounded-xl p-2" required></select>
          </label>

          <label class="flex flex-col gap-2">
            <span class="text-sm font-semibold">Kategoria pośrednia</span>
            <select id="categorySelect" class="border rounded-xl p-2" required></select>
          </label>

          <button
            type="submit"
            class="mt-6 md:mt-0 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl px-4 py-2 font-semibold"
          >
            Wyznacz trasę
          </button>
        </form>

        <div id="status" class="mt-4 text-sm text-slate-600"></div>
      </section>

      <section class="mt-6 bg-white rounded-2xl shadow-lg p-4">
        <div id="map" class="rounded-xl"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const API_BASE = (() => {
        const apiOverride = new URLSearchParams(window.location.search).get("api");
        if (apiOverride) {
          return apiOverride.replace(/\/$/, "");
        }

        const isLocalHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (window.location.protocol === "file:" || isLocalHost) {
          return "http://127.0.0.1:8001";
        }

        return window.location.origin;
      })();
      const statusEl = document.getElementById("status");
      const startSelect = document.getElementById("startSelect");
      const endSelect = document.getElementById("endSelect");
      const categorySelect = document.getElementById("categorySelect");
      const form = document.getElementById("routeForm");

      const map = L.map("map").setView([52.0, 19.0], 6);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      let markers = [];
      let polyline = null;

      function clearMap() {
        markers.forEach((marker) => marker.remove());
        markers = [];
        if (polyline) {
          polyline.remove();
          polyline = null;
        }
      }

      function fillSelect(selectEl, options) {
        selectEl.innerHTML = options
          .map((option) => `<option value="${option}">${option}</option>`)
          .join("");
      }

      async function loadInitialData() {
        statusEl.textContent = "Ładowanie lokalizacji i kategorii...";
        try {
          const [locationsRes, categoriesRes] = await Promise.all([
            fetch(`${API_BASE}/api/locations`),
            fetch(`${API_BASE}/api/categories`),
          ]);

          if (!locationsRes.ok || !categoriesRes.ok) {
            throw new Error("Błąd pobierania danych z API.");
          }

          const locations = await locationsRes.json();
          const categories = await categoriesRes.json();
          const locationNames = locations.map((location) => location.name);

          fillSelect(startSelect, locationNames);
          fillSelect(endSelect, locationNames);
          fillSelect(categorySelect, categories);

          if (locationNames.length > 1) {
            endSelect.selectedIndex = 1;
          }

          statusEl.textContent = "Dane załadowane. Wybierz parametry trasy.";
        } catch (error) {
          statusEl.textContent = `Nie udało się załadować danych: ${error.message}`;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearMap();
        statusEl.textContent = "Wyznaczanie trasy...";

        try {
          const response = await fetch(`${API_BASE}/api/route`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              start: startSelect.value,
              end: endSelect.value,
              category: categorySelect.value,
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Nieznany błąd.");
          }

          const waypoints = data.route.map((point) => [point.lat, point.lng]);

          // Pobierz trasę po drogach z OSRM dla każdego kolejnego segmentu
          statusEl.textContent = "Pobieranie trasy drogowej...";
          const allCoords = [];
          for (let i = 0; i < waypoints.length - 1; i++) {
            const [lat1, lng1] = waypoints[i];
            const [lat2, lng2] = waypoints[i + 1];
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson`;
            const osrmRes = await fetch(osrmUrl);
            const osrmData = await osrmRes.json();
            if (osrmData.code !== "Ok") throw new Error("Błąd routingu OSRM.");
            const segCoords = osrmData.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
            if (i === 0) allCoords.push(...segCoords);
            else allCoords.push(...segCoords.slice(1));
          }

          polyline = L.polyline(allCoords, { color: "#4f46e5", weight: 5 }).addTo(map);

          data.route.forEach((point, index) => {
            const marker = L.marker([point.lat, point.lng])
              .bindPopup(
                `<strong>${index + 1}. ${point.name}</strong><br/>${point.description}`
              )
              .addTo(map);
            markers.push(marker);
          });

          map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
          statusEl.textContent = `Trasa gotowa. Łączny dystans: ${data.total_distance_km} km.`;
        } catch (error) {
          statusEl.textContent = `Błąd wyznaczania trasy: ${error.message}`;
        }
      });

      loadInitialData();
    </script>
  </body>
</html>
