services:
  neo4j:
    image: neo4j:5-community
    container_name: tripplanner-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/ZAQ!2wsx"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ZAQ!2wsx 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build: .
    container_name: tripplanner-api
    ports:
      - "8001:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "ZAQ!2wsx"
      ALLOWED_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500,http://localhost:8001,http://127.0.0.1:8001"
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: tripplanner-frontend
    ports:
      - "5500:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api

  seed:
    build: .
    container_name: tripplanner-seed
    command: ["python", "seed.py"]
    profiles: ["tools"]
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "ZAQ!2wsx"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
